<div class="auth-container">
  <div class="auth-card">
    <h2>Connexion</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          formControlName="email" 
          placeholder="votre@email.com"
          [class.error]="email?.invalid && email?.touched"
        >
        <div class="error-text" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">L'email est requis</span>
          <span *ngIf="email?.errors?.['email']">Format d'email invalide</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password"
          formControlName="password" 
          placeholder="••••••"
          [class.error]="password?.invalid && password?.touched"
        >
        <div class="error-text" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Le mot de passe est requis</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-primary">
        <span *ngIf="isLoading">Connexion...</span>
        <span *ngIf="!isLoading">Se connecter</span>
      </button>

    </form>

    <div class="auth-links">
      <a routerLink="/reset-password">Mot de passe oublié ?</a>
      <p>Pas encore de compte ? <a routerLink="/register">S'inscrire</a></p>
    </div>

  </div>
</div>
