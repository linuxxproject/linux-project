<div class="auth-container">
  <div class="auth-card">
    <h2>Inscription</h2>

    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
      
      <div class="form-group">
        <label for="name">Nom complet</label>
        <input 
          type="text" 
          id="name"
          formControlName="name" 
          placeholder="Jean Dupont"
          [class.error]="name?.invalid && name?.touched"
        >
        <div class="error-text" *ngIf="name?.invalid && name?.touched">
          <span *ngIf="name?.errors?.['required']">Le nom est requis</span>
          <span *ngIf="name?.errors?.['minlength']">Minimum 2 caractères</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          formControlName="email" 
          placeholder="votre@email.com"
          [class.error]="email?.invalid && email?.touched"
        >
        <div class="error-text" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">L'email est requis</span>
          <span *ngIf="email?.errors?.['email']">Format invalide</span>
        </div>
      </div>

      <div class="form-group">
        <label for="role">Je suis un</label>
        <select id="role" formControlName="role">
          <option value="client">Client (je publie des missions)</option>
          <option value="freelance">Freelance (je trouve des missions)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password"
          formControlName="password" 
          placeholder="••••••"
          [class.error]="password?.invalid && password?.touched"
        >
        <div class="error-text" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Le mot de passe est requis</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password_confirmation">Confirmer le mot de passe</label>
        <input 
          type="password" 
          id="password_confirmation"
          formControlName="password_confirmation" 
          placeholder="••••••"
          [class.error]="registerForm.errors?.['mismatch'] && passwordConfirmation?.touched"
        >
        <div class="error-text" *ngIf="registerForm.errors?.['mismatch'] && passwordConfirmation?.touched">
          Les mots de passe ne correspondent pas
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn-primary">
        <span *ngIf="isLoading">Inscription...</span>
        <span *ngIf="!isLoading">S'inscrire</span>
      </button>

    </form>

    <div class="auth-links" *ngIf="!successMessage">
      <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
    </div>

  </div>
</div>
