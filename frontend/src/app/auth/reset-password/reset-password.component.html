<div class="auth-container">
  <div class="auth-card">
    <h2>Réinitialiser le mot de passe</h2>

    <div class="success-message" *ngIf="isSuccess">
      {{ message }}
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="!isSuccess">
      
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          formControlName="email" 
          placeholder="votre@email.com"
          [class.error]="email?.invalid && email?.touched"
        >
        <div class="error-text" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">L'email est requis</span>
          <span *ngIf="email?.errors?.['email']">Format invalide</span>
        </div>
      </div>

      <button type="submit" [disabled]="resetForm.invalid || isLoading" class="btn-primary">
        <span *ngIf="isLoading">Envoi...</span>
        <span *ngIf="!isLoading">Envoyer le lien</span>
      </button>

    </form>

    <div class="auth-links">
      <a routerLink="/login">← Retour à la connexion</a>
    </div>

  </div>
</div>
