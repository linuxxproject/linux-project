<div class="layout">
  <app-sidebar [role]="'admin'" [activeRoute]="'/admin'"></app-sidebar>
  <div class="content">
    <app-header [role]="'Admin'" [userName]="'Admin'" [initials]="'A'"></app-header>
    <div class="app-main">
      <div class="pg-title">Tableau de bord — Administration</div>
      <div class="stats stats-4">
        <div class="stat" *ngFor="let s of stats">
          <div class="stat-lbl">{{ s.label }}</div>
          <div class="stat-val" [style.color]="s.color || '#1e3a8a'">{{ s.value }}</div>
          <div class="stat-sub">{{ s.sub }}</div>
        </div>
      </div>
        <div class="grid-2">
          <div>
            <div class="row-title" style="margin-bottom:8px;">Derniers utilisateurs</div>
            <div class="tbl">
              <div class="tr tr-3u hd"><div>Nom</div><div>Rôle</div><div>Statut</div></div>
              <div class="tr tr-3u" *ngFor="let u of users">
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;"><div class="mav">{{ u.initials }}</div>{{ u.name }}</div>
                <div><span class="badge" [class.b-client]="u.role === 'Client'" [class.b-freelance]="u.role === 'Freelance'">{{ u.role }}</span></div>
                <div><span class="badge" [class.b-accepted]="u.status === 'Actif'" [class.b-closed]="u.status === 'Inactif'">{{ u.status }}</span></div>
              </div>
            </div>
          </div>
          <div>
            <div class="row-title" style="margin-bottom:8px;">Activité mensuelle</div>
            <div class="card">
              <div class="chart-bars">
                <div class="bar-wrap" *ngFor="let m of chartMonths">
                  <div class="bar" [style.height.px]="m.height" [style.background]="m.color"></div>
                  <div class="bar-lbl">{{ m.label }}</div>
                </div>
              </div>
              <div style="font-size:10px;color:#94a3b8;text-align:center;margin-top:6px;">Nouvelles missions par mois</div>
            </div>
          </div>
        </div>
    </div>
  </div>
</div>
