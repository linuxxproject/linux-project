<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <rect x="5" y="9" width="10" height="8" rx="2" stroke="#1a56db" stroke-width="1.5"/>
        <path d="M7 9V7a3 3 0 016 0v2" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="auth-brand">Mot de passe oublié</div>
    <div class="auth-info">Un email de réinitialisation vous sera envoyé</div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="votre@email.com" />
    </div>

    <button class="auth-btn" (click)="send()" [disabled]="loading">
      {{ loading ? 'Envoi...' : (sent ? 'Lien envoyé' : 'Envoyer le lien') }}
    </button>

    <div class="auth-div"></div>
    <button class="auth-link" routerLink="/auth/login">Retour à la connexion</button>
  </div>
</div>
