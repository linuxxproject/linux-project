<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <rect x="5" y="9" width="10" height="8" rx="2" stroke="#1a56db" stroke-width="1.5"/>
        <path d="M7 9V7a3 3 0 016 0v2" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="auth-brand">Mot de passe oublié</div>
    <div class="auth-sub">Entrez votre email pour recevoir un lien de réinitialisation</div>

    <div class="auth-info auth-error" *ngIf="error">{{ error }}</div>
    <div class="auth-info auth-success" *ngIf="success">{{ success }}</div>

    <div class="auth-field" *ngIf="!sent">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="votre@email.com" />
    </div>

    <button class="auth-btn" (click)="send()" [disabled]="loading || sent" *ngIf="!sent">
      {{ loading ? 'Envoi...' : 'Envoyer le lien' }}
    </button>

    <div class="auth-div"></div>
    <button class="auth-link" routerLink="/auth">Retour a la connexion</button>
  </div>
</div>
