<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <circle cx="10" cy="7" r="3" stroke="#1a56db" stroke-width="1.5"/>
        <path d="M4 17c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="auth-brand">Créer un compte</div>

    <div class="auth-info" *ngIf="error">{{ error }}</div>

    <div class="role-row">
      <div class="role-btn" [class.on]="role === 'client'" (click)="role = 'client'">Client</div>
      <div class="role-btn" [class.on]="role === 'freelance'" (click)="role = 'freelance'">Freelance</div>
    </div>

    <div class="auth-field">
      <label>Nom complet</label>
      <input type="text" [(ngModel)]="name" placeholder="Votre nom" />
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="votre@email.com" />
    </div>
    <div class="auth-field">
      <label>Ville</label>
      <input type="text" [(ngModel)]="city" placeholder="Votre ville" />
    </div>
    <div class="auth-field">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>

    <button class="auth-btn" (click)="register()" [disabled]="loading">
      {{ loading ? 'Création...' : 'Créer mon compte' }}
    </button>

    <div class="auth-div"></div>
    <div class="auth-reg">
      <span>Déjà un compte ?</span>
      <a routerLink="/auth">Se connecter</a>
    </div>
  </div>
</div>
