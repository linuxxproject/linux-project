<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <circle cx="10" cy="10" r="8" stroke="#1a56db" stroke-width="1.5"/>
        <path d="M7 10l2 2 4-4" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="auth-brand">FreelancePro</div>
    <div class="auth-sub">Connectez-vous à votre compte</div>

    <div class="auth-info" *ngIf="error">{{ error }}</div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="votre@email.com" />
    </div>
    <div class="auth-field">
      <label>Mot de passe</label>
      <div class="password-input-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="••••••••" />
        <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" title="Afficher/Masquer le mot de passe">
          <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>
    </div>

    <button class="auth-btn" (click)="login()" [disabled]="loading">
      {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>

    <button class="auth-link" routerLink="/auth/forgot-password">Mot de passe oublié ?</button>
    <div class="auth-div"></div>
    <div class="auth-reg">
      <span>Pas de compte ?</span>
      <a routerLink="/auth/register">S'inscrire</a>
    </div>
  </div>
</div>
