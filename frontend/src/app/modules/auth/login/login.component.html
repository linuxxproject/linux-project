<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <circle cx="10" cy="10" r="8" stroke="#1a56db" stroke-width="1.5"/>
        <path d="M7 10l2 2 4-4" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="auth-brand">FreelancePro</div>
    <div class="auth-sub">Connectez-vous à votre compte</div>

    <div class="auth-info" *ngIf="error">{{ error }}</div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="votre@email.com" />
    </div>
    <div class="auth-field">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>

    <button class="auth-btn" (click)="login()" [disabled]="loading">
      {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>

    <button class="auth-link" routerLink="/auth/forgot-password">Mot de passe oublié ?</button>
    <div class="auth-div"></div>
    <div class="auth-reg">
      <span>Pas de compte ?</span>
      <a routerLink="/auth/register">S'inscrire</a>
    </div>
  </div>
</div>
