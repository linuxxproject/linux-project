<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <circle cx="10" cy="10" r="8" stroke="#1a56db" stroke-width="1.5"/>
        <path d="M7 10l2 2 4-4" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="auth-brand">Vérification</div>
    <div class="auth-info">Entrez le code envoyé par email</div>

    <div class="auth-field">
      <label>Code de vérification</label>
      <input type="text" [(ngModel)]="code" placeholder="123456" maxlength="6" />
    </div>

    <button class="auth-btn" (click)="verify()" [disabled]="loading">
      {{ loading ? 'Vérification...' : 'Vérifier' }}
    </button>

    <div class="auth-div"></div>
    <button class="auth-link" routerLink="/auth/login">Retour à la connexion</button>
  </div>
</div>
