<div class="layout">
  <app-sidebar [role]="role" [activeRoute]="'/missions'"></app-sidebar>

  <div class="content">
    <app-header
      [role]="role === 'client' ? 'Client' : role === 'freelance' ? 'Freelance' : 'Admin'"
      [userName]="user?.name"
      [initials]="initials()">
    </app-header>

    <div class="app-main">
      <div class="pg-title">Missions disponibles</div>

      <div class="stats stats-4">
        <div class="stat">
          <div class="stat-lbl">Total</div>
          <div class="stat-val">{{ missions.length }}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Ouvertes</div>
          <div class="stat-val" style="color:#1a56db;">{{ countByStatus('ouverte') }}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">En cours</div>
          <div class="stat-val" style="color:#d97706;">{{ countByStatus('en_cours') }}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Terminées</div>
          <div class="stat-val" style="color:#059669;">{{ countByStatus('fermee') }}</div>
        </div>
      </div>

      <div class="filters">
        <input class="search-bar" type="text" placeholder="Rechercher une mission..." [(ngModel)]="search" />
        <div class="filter-pill" [class.on]="filter === 'all'" (click)="filter = 'all'">Toutes</div>
        <div class="filter-pill" [class.on]="filter === 'open'" (click)="filter = 'open'">Ouvertes</div>
        <div class="filter-pill" [class.on]="filter === 'inprogress'" (click)="filter = 'inprogress'">En cours</div>
        <div class="filter-pill" [class.on]="filter === 'closed'" (click)="filter = 'closed'">Terminées</div>
      </div>

      <p *ngIf="loading" style="font-size:12px;color:var(--gray-400);">Chargement des missions...</p>
      <p *ngIf="error" style="font-size:12px;color:var(--red);">{{ error }}</p>

      <div class="grid-3" *ngIf="filteredMissions.length > 0">
        <app-mission-card
          *ngFor="let m of filteredMissions"
          [title]="m.title"
          [budget]="m.budget + ' MAD'"
          [status]="formatStatus(m.status)"
          [meta]="m.category || 'Général'"
          [description]="m.description"
          [actionLabel]="role === 'freelance' && m.status === 'ouverte' ? 'Postuler' : 'Voir détail'"
          [actionType]="role === 'freelance' && m.status === 'ouverte' ? 'primary' : 'outline'"
          (action)="role === 'freelance' && m.status === 'ouverte' ? apply(m.id) : view(m.id)">
        </app-mission-card>
      </div>

      <div class="empty-box" *ngIf="!loading && filteredMissions.length === 0">
        Aucune mission trouvée.
      </div>
    </div>
  </div>
</div>
