<div class="mission-item">
  <div class="mi-top">
    <div class="mi-title">{{ title }}</div>
    <div class="mi-budget">{{ budget }}</div>
  </div>
  <div class="mi-meta">
    <span class="badge" [class.b-open]="status === 'Ouverte'" [class.b-progress]="status === 'En cours' || status === 'En attente'" [class.b-closed]="status === 'Fermée'" [class.b-accepted]="status === 'Acceptée'" [class.b-rejected]="status === 'Refusée'">{{ status }}</span>
    <span class="mi-date">{{ meta }}</span>
  </div>
  <div class="mi-desc" *ngIf="description">{{ description }}</div>
  <button class="btn" [class.btn-primary]="actionType === 'primary'" [class.btn-outline]="actionType === 'outline'" *ngIf="actionLabel" (click)="onAction()">{{ actionLabel }}</button>
</div>
