<div class="app-sidebar">
  <div
    class="si"
    *ngFor="let item of items"
    [class.on]="isActive(item.route)"
    [routerLink]="item.route"
  >
    <svg viewBox="0 0 14 14" fill="none" *ngIf="item.icon === 'dashboard'">
      <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
      <rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
      <rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
      <rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
    </svg>

    <svg viewBox="0 0 14 14" fill="none" *ngIf="item.icon === 'missions'">
      <rect x="1" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
      <path d="M1 6h12" stroke="currentColor" stroke-width="1.2"/>
    </svg>

    <svg viewBox="0 0 14 14" fill="none" *ngIf="item.icon === 'candidatures' || item.icon === 'profil'">
      <circle cx="7" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/>
      <path d="M1 13c0-3 2-4 6-4s6 1 6 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>

    <svg viewBox="0 0 14 14" fill="none" *ngIf="item.icon === 'messagerie'">
      <path d="M2 2h10v8H8l-3 2V10H2V2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>

    {{ item.label }}
  </div>
</div>
