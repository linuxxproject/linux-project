version: "3.9"

services:
  laravel:
    image: nassimaafottih/laravel_app:latest
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - app_network
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
     - "8000:80"
    volumes:
      - .:/var/www
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
    - laravel
    networks:
      - app_network  
  angular:
    image: node:20
    container_name: angular_app
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    networks:
      - app_network

networks:
  app_network:

volumes:
  mysql_data:
